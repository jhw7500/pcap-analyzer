{% extends "base.html" %}
{% block title %}설정{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">설정</h1>

<form method="post" action="/settings" class="space-y-6">
    <!-- tshark 설정 -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <h2 class="text-lg font-semibold mb-4">tshark</h2>
        <div class="flex items-center gap-3 mb-3">
            <span class="text-sm">상태:</span>
            {% if tshark %}
            <span class="text-green-400 text-sm">감지됨 ({{ tshark }})</span>
            {% else %}
            <span class="text-red-400 text-sm">미감지</span>
            {% endif %}
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">tshark 경로 (자동 감지 안 되면 직접 입력)</label>
            <input type="text" name="tshark_path" value="{{ config.get('tshark_path', '') }}"
                   placeholder="/usr/bin/tshark"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm">
        </div>
    </div>

    <!-- AI 설정 -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <h2 class="text-lg font-semibold mb-4">AI 리뷰</h2>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs text-gray-500 mb-1">AI 프로바이더</label>
                <select name="ai_provider" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm">
                    <option value="">비활성화</option>
                    <option value="claude" {% if config.get('ai_provider') == 'claude' %}selected{% endif %}>Claude (Anthropic)</option>
                    <option value="openai" {% if config.get('ai_provider') == 'openai' %}selected{% endif %}>OpenAI</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">모델</label>
                <input type="text" name="ai_model" value="{{ config.get('ai_model', '') }}"
                       placeholder="claude-sonnet-4-6"
                       class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm">
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-gray-500 mb-1">API 키 (환경변수 PCAP_AI_API_KEY로도 설정 가능, 비워두면 기존 값 유지)</label>
                <input type="password" name="ai_api_key" value=""
                       placeholder="{{ ai_api_key_hint or 'sk-...' }}"
                       autocomplete="off"
                       class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm">
            </div>
            <div class="col-span-2">
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" name="ai_auto_review" value="true"
                           {% if config.get('ai_auto_review') == 'true' %}checked{% endif %}
                           class="rounded bg-gray-700 border-gray-600">
                    분석 완료 시 자동 AI 리뷰 실행
                </label>
            </div>
        </div>
    </div>

    <!-- UI 에셋 -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <h2 class="text-lg font-semibold mb-4">UI 에셋</h2>
        <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" name="ui_offline_assets" value="true"
                   {% if config.get('ui_offline_assets') == 'true' %}checked{% endif %}
                   class="rounded bg-gray-700 border-gray-600">
            오프라인 에셋 사용 (static/vendor/tailwind.js, plotly.min.js)
        </label>
        <p class="text-xs text-gray-500 mt-2">
            폐쇄망 환경에서 CDN 대신 로컬 에셋을 사용합니다.
            <code class="bg-gray-700 px-1 rounded">make fetch-vendor</code>로 에셋을 먼저 받아두세요.
        </p>
    </div>

    <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-semibold transition-colors">
        저장
    </button>
</form>
{% endblock %}
