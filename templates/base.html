<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WLAN Pcap Analyzer{% endblock %}</title>
    {% if offline_assets %}
    <script src="/static/vendor/tailwind.js"></script>
    <script src="/static/vendor/plotly.min.js"></script>
    {% else %}
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    {% endif %}
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-blue-400">WLAN Pcap Analyzer</a>
        <div class="flex gap-4 text-sm">
            <a href="/" class="hover:text-blue-400">대시보드</a>
            <a href="/settings" class="hover:text-blue-400">설정</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
