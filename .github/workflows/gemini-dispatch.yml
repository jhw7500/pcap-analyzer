name: '🔀 Gemini Dispatch'

on:
  pull_request_review_comment:
    types:
      - 'created'
  # pull_request_review 트리거 제거: 봇 리뷰가 dispatch를 다시 깨워 또 리뷰를
  # 남기는 피드백 루프를 유발했음(claude.yml과 동일 사유).
  pull_request:
    types:
      - 'opened'
  issues:
    types:
      - 'opened'
      - 'reopened'
  issue_comment:
    types:
      - 'created'

defaults:
  run:
    shell: 'bash'

jobs:
  dispatch:
    uses: 'jhw7500/automation/.github/workflows/gemini-dispatch.yml@v1.30'
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    secrets: inherit
